# =============================================================================
# omniscient-agentic-ide.yml  — Omniscient IDE build + agent safety gate
# -----------------------------------------------------------------------------
# SOURCE: ~/dev/OMNISCIENT-Agentic-AI-Sandbox-Mod-L/README.md  (agentic IDE:
#   multi-agent feedback, Gemini thinking budgets, Sovereign Agent Dashboard for
#   agent constraints/sandbox params (memory/CPU), MVVM+Compose, signed APK via
#   KEYSTORE_* secrets).
#
# AGENTIC BEHAVIOR:
#   * Builds the Android APK via the documented signed-release path using
#     ${{ secrets.KEYSTORE_* }} (never inline).
#   * Runs an AGENT SAFETY GATE: calls the REAL LLM to audit the repo for unsafe
#     agent constraints (over-broad sandbox, secret exposure) and emit a verdict.
#   * If the gate flags violations, the build is blocked and a report posted.
#   * Mirrors the "Sovereign Agent Dashboard" constraint-checking in CI.
# =============================================================================
name: "Omniscient ▸ Build + Agent Safety Gate"
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Decode keystore from secret"
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/key.jks"
            echo "keystore decoded"
          else
            echo "::warning::KEYSTORE_BASE64 not set; signing step will be skipped"
          fi

      - name: "Set up JDK + Android SDK"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: "Build release APK (if gradle present)"
        shell: bash
        run: |
          set -euo pipefail
          if [ -f gradlew ]; then
            chmod +x gradlew
            if [ -f "$RUNNER_TEMP/key.jks" ]; then
              ./gradlew assembleRelease \
                -PKEYSTORE="$RUNNER_TEMP/key.jks" \
                -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
                -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
                -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            else
              ./gradlew assembleRelease || echo "unsigned build attempted"
            fi
          else
            echo "no gradlew; skipping android build"
          fi

      - name: "Agent Safety Gate (real LLM audit)"
        if: ${{ secrets.LLM_API_KEY != '' }}
        id: gate
        uses: ./.github/actions/llm/action.yml
        with:
          system: "You are the Sovereign Agent safety auditor. Scan the repo for unsafe agent constraints: over-broad sandbox permissions, leaked secrets, unbounded agent loops. Return VERDICT: SAFE or VERDICT: BLOCK plus bullet findings."
          temperature: "0.2"
          max_tokens: "1000"
          prompt: |
            Audit this repository for agent-safety violations:
            - Any hardcoded secrets/keys/tokens in source?
            - Any agent loop without a max-iteration cap?
            - Any sandbox config granting root/docker/systemd?
            Repo file sample:
            ${{ steps.checkout.outputs }} 

      - name: "Enforce gate"
        if: ${{ steps.gate.outputs.completion != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if echo "${{ steps.gate.outputs.completion }}" | grep -qiE 'VERDICT:\s*BLOCK'; then
            echo "::error::Agent safety gate BLOCKED the build"; exit 1
          fi
          echo "agent safety gate: SAFE"
